interface:
  display_name: "Convert X Likes to Markdown"
  short_description: "Convert X likes JSON into local classified Markdown with merge/create and zh/en title output"
  default_prompt: "Use $convert-x-likes-to-markdown to convert X likes JSON into local Markdown with semantic classification and indexes. Before running, tell the user which inputs are required, show the allowed options for each field, and collect them in a short one-question-at-a-time flow by default. Only offer a single structured reply line as an optional shortcut if the user wants it. If the user is updating or merging into an existing X Likes archive, inspect that archive first and treat its current language, naming, and category structure as the source of truth. If the user selects auto, use the already-designated Markdown classification note for that workspace or repository automatically unless it is ambiguous or missing. If the user selects manual, ask them to provide the classification source either by pasting Markdown in the input box or by giving another Markdown path. In merge flows, preserve the user's current repository conventions; only use classification as a way to map posts into the chosen taxonomy."
